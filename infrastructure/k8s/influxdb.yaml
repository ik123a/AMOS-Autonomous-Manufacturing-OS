apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: amos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "1000m", memory: "4Gi" }
      volumes:
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: amos
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: amos
spec:
  selector:
    app: influxdb
  ports:
    - port: 8086
      targetPort: 8086