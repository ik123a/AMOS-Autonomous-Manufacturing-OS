apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: amos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      containers:
        - name: alert-service
          image: amos/alert-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: amos-config
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: amos
spec:
  selector:
    app: alert-service
  ports:
    - port: 80
      targetPort: 8000