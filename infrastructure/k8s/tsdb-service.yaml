apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsdb-service
  namespace: amos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsdb-service
  template:
    metadata:
      labels:
        app: tsdb-service
    spec:
      containers:
        - name: tsdb-service
          image: amos/tsdb-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: amos-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: tsdb-service
  namespace: amos
spec:
  selector:
    app: tsdb-service
  ports:
    - port: 80
      targetPort: 8000