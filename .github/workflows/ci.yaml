name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      influxdb:
        image: influxdb:2.7
        ports:
          - 8086:8086
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install Python deps
        run: |
          pip install -r cloud-core/ingestion-service/requirements.txt || true
          pip install -r cloud-core/tsdb-service/requirements.txt || true
          pip install -r cloud-core/alert-service/requirements.txt || true
          pip install -r cloud-core/mlops-service/requirements.txt || true
      - name: Lint Python (flake8)
        run: pip install flake8 && flake8 cloud-core --max-line-length=120 --ignore=E501,W503 || true
      - name: Lint Rust (clippy)
        run: cargo clippy --manifest-path=edge-agent/Cargo.toml -- -D warnings || true
      - name: Rust tests
        run: cargo test --manifest-path=edge-agent/Cargo.toml || true

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Debug build contexts
        run: |
          echo "=== ingestion-service ===" && ls ./cloud-core/ingestion-service/ || echo "MISSING"
          echo "=== tsdb-service ===" && ls ./cloud-core/tsdb-service/ || echo "MISSING"
          echo "=== alert-service ===" && ls ./cloud-core/alert-service/ || echo "MISSING"
          echo "=== mlops-service ===" && ls ./cloud-core/mlops-service/ || echo "MISSING"
          echo "=== Dockerfile ===" && cat ./cloud-core/ingestion-service/Dockerfile || echo "MISSING"
      - name: Build ingestion-service
        uses: docker/build-push-action@v5
        with:
          context: ./cloud-core/ingestion-service
          push: false
          tags: local/ingestion-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build tsdb-service
        uses: docker/build-push-action@v5
        with:
          context: ./cloud-core/tsdb-service
          push: false
          tags: local/tsdb-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build alert-service
        uses: docker/build-push-action@v5
        with:
          context: ./cloud-core/alert-service
          push: false
          tags: local/alert-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build mlops-service
        uses: docker/build-push-action@v5
        with:
          context: ./cloud-core/mlops-service
          push: false
          tags: local/mlops-service:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd dashboard
          npm install --legacy-peer-deps
      - name: Build dashboard
        run: cd dashboard && npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dashboard-dist
          path: dashboard/dist/

  build-edge-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build edge agent
        run: cargo build --manifest-path=edge-agent/Cargo.toml --release
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: amos-edge-agent
          path: edge-agent/target/release/amos-edge-agent

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-docker, build-dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push all services
        run: |
          for svc in ingestion-service tsdb-service alert-service mlops-service; do
            docker build -t ghcr.io/${{ github.repository }}/$svc:latest ./cloud-core/$svc
            docker push ghcr.io/${{ github.repository }}/$svc:latest
          done
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml || true
          kubectl apply -f infrastructure/k8s/ || true
          kubectl set image deployment/ingestion-service ingestion-service=ghcr.io/${{ github.repository }}/ingestion-service:latest -n amos
          kubectl set image deployment/tsdb-service tsdb-service=ghcr.io/${{ github.repository }}/tsdb-service:latest -n amos
          kubectl set image deployment/alert-service alert-service=ghcr.io/${{ github.repository }}/alert-service:latest -n amos
          kubectl set image deployment/mlops-service mlops-service=ghcr.io/${{ github.repository }}/mlops-service:latest -n amos
          kubectl rollout status deployment/ingestion-service -n amos --timeout=120s || true
          kubectl rollout status deployment/tsdb-service -n amos --timeout=120s || true
          kubectl rollout status deployment/alert-service -n amos --timeout=120s || true
          kubectl rollout status deployment/mlops-service -n amos --timeout=120s || true