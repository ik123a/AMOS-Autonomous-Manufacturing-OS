name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  rust-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Check Rust files
      run: |
        if [ -d "edge" ]; then
          cargo check --manifest-path edge/Cargo.toml
        else
          echo "No edge directory found"
        fi

  python-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Check Python server
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # run linter checks
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
